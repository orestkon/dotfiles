# =============================================
# 1. SYSTEM COMMANDS
# =============================================
# Reload config quickly
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# DETACH (Default): Prefix + d 
# Leaves session running.

# KILL SESSION: Prefix + X
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# KILL WINDOW: Prefix + x
bind x confirm-before -p "Kill window #W? (y/n)" kill-window

# =============================================
# 2. VIM-MODE (The Wanderer)
# =============================================
# Enter Mode: Prefix + [
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi 'C-[' send-keys -X cancel

# =============================================
# 3. NAVIGATION & WINDOWS
# =============================================
# Quick Window Switching (Alt + Number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2

# Better splits (Prefix + | or -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane Navigation (Vim Keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
